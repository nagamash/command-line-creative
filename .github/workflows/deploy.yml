name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SSHPASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y sshpass

          : "${SFTP_HOST:?Missing SFTP_HOST secret}"
          : "${SFTP_USER:?Missing SFTP_USER secret}"
          : "${SSHPASS:?Missing SFTP_PASS secret}"
          : "${SFTP_REMOTE_DIR:?Missing SFTP_REMOTE_DIR secret}"

          cat > /tmp/deploy.sftp <<EOF
          cd ${SFTP_REMOTE_DIR}
          -mkdir clc
          put clc/index.html clc/index.html
          EOF

          sshpass -e sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oUserKnownHostsFile=/dev/null \
            -oPubkeyAuthentication=no \
            -oPreferredAuthentications=keyboard-interactive,password \
            -oNumberOfPasswordPrompts=1 \
            -P 22 \
            -b /tmp/deploy.sftp \
            "$SFTP_USER@$SFTP_HOST"
