name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SSHPASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp sshpass
          python3 << 'PYEOF'
          import os, subprocess

          script = "\n".join([
              "set sftp:connect-program 'sshpass -e ssh -a -x -oStrictHostKeyChecking=no'",
              "set net:max-retries 3",
              "open sftp://{}@{}:22".format(os.environ["SFTP_USER"], os.environ["SFTP_HOST"]),
              "mirror --reverse --verbose --no-perms --exclude .git/ --exclude .github/ --exclude schema.sql ./ {}".format(os.environ["SFTP_REMOTE_DIR"]),
              "bye",
          ])

          with open("/tmp/deploy.lftp", "w") as f:
              f.write(script)

          result = subprocess.run(["lftp", "-f", "/tmp/deploy.lftp"])
          exit(result.returncode)
          PYEOF
