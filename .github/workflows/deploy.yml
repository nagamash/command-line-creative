name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y expect

          : "${SFTP_HOST:?Missing SFTP_HOST secret}"
          : "${SFTP_USER:?Missing SFTP_USER secret}"
          : "${SFTP_PASS:?Missing SFTP_PASS secret}"
          : "${SFTP_REMOTE_DIR:?Missing SFTP_REMOTE_DIR secret}"

          cat > /tmp/deploy.expect <<'EOF'
          set timeout 60

          spawn sftp \
            -oStrictHostKeyChecking=no \
            -oUserKnownHostsFile=/dev/null \
            -P 22 \
            "$env(SFTP_USER)@$env(SFTP_HOST)"

          expect {
            -re "(?i)password:" {
              send -- "$env(SFTP_PASS)\r"
            }
            timeout {
              puts "Timed out waiting for password prompt"
              exit 1
            }
            eof {
              puts "SFTP exited before password prompt"
              exit 1
            }
          }

          expect {
            "sftp>" {}
            timeout {
              puts "Timed out waiting for SFTP prompt after login"
              exit 1
            }
            eof {
              puts "SFTP login failed"
              exit 1
            }
          }

          send -- "cd $env(SFTP_REMOTE_DIR)\r"
          expect "sftp>"

          send -- "mkdir clc\r"
          expect "sftp>"

          send -- "put clc/index.html clc/index.html\r"
          expect "sftp>"

          send -- "chmod 644 clc/index.html\r"
          expect "sftp>"

          send -- "bye\r"
          expect eof
          EOF

          expect /tmp/deploy.expect
