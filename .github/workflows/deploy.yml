name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$SFTP_USER,$SFTP_PASS" "sftp://$SFTP_HOST:22" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --verbose --no-perms --exclude .git/ --exclude .github/ --exclude schema.sql ./ $SFTP_REMOTE_DIR;
            bye
          "
