name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            open sftp://${{ secrets.SFTP_USER }}:${{ secrets.SFTP_PASS }}@${{ secrets.SFTP_HOST }};
            mirror --reverse --verbose --no-perms --exclude .git/ --exclude .github/ --exclude schema.sql ./ ${{ secrets.SFTP_REMOTE_DIR }};
            bye
          "
